<!DOCTYPE html>
<html lang="es">  
<head>  
<meta charset="UTF-8">  
<title>Para ti 💙</title>  

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap" rel="stylesheet">  

<style>  
*{box-sizing:border-box;margin:0;padding:0}  

body{  
  height:100vh;  
  overflow:hidden;  
  font-family:'Segoe UI',sans-serif;  
  background:linear-gradient(180deg,#6ec6ff,#2193b0);  
  color:white;  
  display:flex;  
  align-items:center;  
  justify-content:center;  
  transition:background 1.5s ease;  
}  

canvas{position:fixed;top:0;left:0;z-index:0;}  

.moon{  
  position:absolute;  
  top:15%;  
  right:10%;  
  width:140px;  
  height:140px;  
  border-radius:50%;  
  background:radial-gradient(circle at 30% 30%, #fff 35%, #ddd 60%, #bbb);  
  box-shadow:0 0 80px white, 0 0 150px rgba(255,255,255,0.4);  
  opacity:0;  
  transition:opacity 2s;  
}  

.card{  
  position:relative;  
  z-index:2;  
  backdrop-filter:blur(25px);  
  background:rgba(255,255,255,0.08);  
  border-radius:25px;  
  padding:28px;  
  width:90%;  
  max-width:400px;  
  text-align:center;  
  box-shadow:0 20px 60px rgba(0,0,0,0.6);  
  border:1px solid rgba(255,255,255,0.2);  
  animation:latido 3s infinite;  
}  

@keyframes latido{  
  0%{transform:scale(1)}  
  50%{transform:scale(1.03)}  
  100%{transform:scale(1)}  
}  

.envelope{  
  margin-top:15px;  
  height:150px;  
  background:linear-gradient(135deg,#e3f2fd,#bbdefb);  
  border-radius:12px;  
  cursor:pointer;  
  position:relative;  
  overflow:hidden;  
}  

.flap{  
  position:absolute;  
  width:100%;  
  height:100%;  
  background:linear-gradient(135deg,#90caf9,#42a5f5);  
  clip-path:polygon(0 0,100% 0,50% 60%);  
  transform-origin:top;  
  transition:0.8s;  
}  

.envelope.open .flap{transform:rotateX(120deg);}  

.letter{  
  position:absolute;  
  width:100%;  
  height:100%;  
  background:white;  
  color:#333;  
  display:flex;  
  align-items:center;  
  justify-content:center;  
  transform:translateY(100%);  
  transition:0.6s;  
}  

.envelope.open .letter{transform:translateY(-10px);}  

#mensaje{  
  font-family:'Caveat',cursive;  
  font-size:1.7em;  
}  

/* 🎈 globos PRO */
.globo{
  position:absolute;
  width:90px;
  height:110px;
  border-radius:50% 50% 45% 45%;
  background:radial-gradient(circle at 30% 30%, #ffffffcc, var(--color) 70%);
  box-shadow:
    inset -8px -12px 25px rgba(0,0,0,0.3),
    0 15px 25px rgba(0,0,0,0.4),
    0 0 20px var(--color);
  animation:float linear infinite;
}
.globo::after{
  content:"";
  position:absolute;
  bottom:-70px;
  left:50%;
  width:2px;
  height:70px;
  background:white;
}

/* confeti */
.confeti{
  position:absolute;
  width:6px;
  height:6px;
}

/* estrellas fugaces */
.shooting-star{
  position:absolute;
  width:4px;
  height:4px;
  background:white;
  border-radius:50%;
  box-shadow:0 0 25px white, 0 0 50px white;
}
.shooting-star::after{
  content:'';
  position:absolute;
  width:140px;
  height:2px;
  background:linear-gradient(to right, white, transparent);
  transform:rotate(45deg);
}

@keyframes float{
  0%{transform:translateY(100vh);opacity:0}
  10%{opacity:1}
  100%{transform:translateY(-10vh);opacity:0}
}

</style>
</head>

<body>

<canvas id="space"></canvas>
<div class="moon" id="moon"></div>

<div class="card">
  <h2>Hola Hanny :)</h2>

  <div class="envelope" id="envelope">
    <div class="flap"></div>
    <div class="letter">
      <p id="mensaje"></p>
    </div>
  </div>

  <button onclick="toggleMusic()">🎵 Música</button>
</div>

<audio id="music" src="mañanitas.mp3"></audio>

<script>

/* estrellas fondo */
const canvas=document.getElementById("space");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let stars=[];
for(let i=0;i<180;i++){
  stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2});
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();

/* estrellas fugaces */
function crearEstrellaFugaz(){
  const star=document.createElement("div");
  star.className="shooting-star";
  star.style.left=Math.random()*window.innerWidth+"px";
  star.style.top=Math.random()*200+"px";
  document.body.appendChild(star);

  star.animate([
    {transform:'translate(0,0)',opacity:1},
    {transform:'translate(300px,300px)',opacity:0}
  ],{duration:800});

  setTimeout(()=>star.remove(),800);
}
setInterval(()=>{if(Math.random()>0.4)crearEstrellaFugaz()},1200);

/* mensajes */
const mensajes=[
"Quería hacerte algo especial 💙",
"Eres una gran amiga",
"Siempre es agradable hablar contigo",
"Tienes una vibra muy agradable",
"Se nota lo dedicada que eres",
"Casi termino...",
"FINAL"
];

let index=0;

function escribir(texto){
  mensaje.innerHTML=texto;
}

function abrir(t){
  envelope.classList.add("open");
  escribir(t);
}

envelope.onclick=()=>{
  index++;
  if(index>=mensajes.length-1){
    abrir("Eres una gran amiga 💙");

    // 🎆 fuegos artificiales
    let i=0;
    const fire=setInterval(()=>{
      crearFuego(Math.random()*innerWidth,Math.random()*innerHeight*0.6);
      i++;
      if(i>8)clearInterval(fire);
    },500);

    return;
  }
  abrir(mensajes[index]);
};

/* globos */
const colores=["#42a5f5","#ef5350","#66bb6a","#ffca28","#ab47bc","#ffa726"];

setInterval(()=>{
  const g=document.createElement("div");
  g.className="globo";
  g.style.left=Math.random()*100+"vw";
  g.style.animationDuration=(10+Math.random()*6)+"s";
  g.style.setProperty('--color', colores[Math.floor(Math.random()*colores.length)]);
  document.body.appendChild(g);

  setTimeout(()=>g.remove(),14000);
},2000);

/* 🎆 fuegos artificiales PRO */
function crearFuego(x,y){
  for(let i=0;i<25;i++){
    const p=document.createElement("div");
    p.className="confeti";
    p.style.left=x+"px";
    p.style.top=y+"px";
    p.style.background=colores[Math.floor(Math.random()*colores.length)];
    document.body.appendChild(p);

    const ang=Math.random()*2*Math.PI;
    const dist=100+Math.random()*120;

    const dx=Math.cos(ang)*dist;
    const dy=Math.sin(ang)*dist;

    p.animate([
      {transform:'translate(0,0)',opacity:1},
      {transform:`translate(${dx}px,${dy}px)`,opacity:0}
    ],{duration:1200});

    setTimeout(()=>p.remove(),1200);
  }
}

function toggleMusic(){
  music.paused?music.play():music.pause();
}

abrir(mensajes[0]);

</script>
</body>
</html>
